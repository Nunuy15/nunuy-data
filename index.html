function build(){
  const months={};
  for(const m of M){months[m]={saldoAwal:RAW[m].s,transactions:RAW[m].t.map(r=>({id:mkId(),tgl:r[0],ket:r[1],masuk:r[2],keluar:r[3],checked:!!r[4]}))};}
  return{months,pelunasan:PEL.map(r=>({id:mkId(),nama:r[0],selesai:r[1],hematBln:r[2],status:r[3]})),tabungan:TAB.map(r=>({id:mkId(),tanggal:r[0],item:r[1],nilai:r[2]}))};
}

const fmt=n=>{if(!n)return'Rp 0';const a=Math.abs(Math.round(n));return(n<0?'-':'')+'Rp '+a.toLocaleString('id-ID')};
const fmtC=n=>{const a=Math.abs(n),s=n<0?'-':'';if(a>=1000000)return s+'Rp '+(a/1000000).toFixed(1).replace(/\.0$/,'')+'jt';if(a>=1000)return s+'Rp '+Math.round(a/1000)+'rb';return s+'Rp '+Math.round(a)};

function load(){
  try{const r=localStorage.getItem(KEY);if(r){const p=JSON.parse(r);let mx=0;for(const m of Object.values(p.months||{}))for(const t of(m.transactions||[]))if(t.id>mx)mx=t.id;for(const x of(p.pelunasan||[]))if(x.id>mx)mx=x.id;for(const x of(p.tabungan||[]))if(x.id>mx)mx=x.id;nid=mx+1;return p;}}catch(e){console.error(e);}return build();
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S.data));}catch(e){console.error(e);}}

function totals(m){const mo=S.data.months[m];if(!mo)return{i:0,o:0,end:0};let i=0,o=0;for(const t of mo.transactions){i+=t.masuk||0;o+=t.keluar||0;}return{i,o,end:(mo.saldoAwal||0)+i-o};}
function rolling(m){const mo=S.data.months[m];if(!mo)return[];let s=mo.saldoAwal||0;return mo.transactions.map(t=>{s+=(t.masuk||0)-(t.keluar||0);return s;});}
function yt(){let i=0,o=0;for(const m of M){const t=totals(m);i+=t.i;o+=t.o;}return{i,o};}
function actCnt(){return S.data.pelunasan.filter(p=>p.status==='aktif').length;}
function actBeb(){return S.data.pelunasan.filter(p=>p.status==='aktif').reduce((s,p)=>s+(p.hematBln||0),0);}
function totTab(){return S.data.tabungan.reduce((s,t)=>s+(t.nilai||0),0);}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function render(){

function bind(){
  const $=id=>document.getElementById(id);

  document.querySelectorAll('[data-month]').forEach(b=>b.onclick=()=>{S.month=b.dataset.month;S.edit=null;render();});
  const cm=$('cm');if(cm)cm.onchange=()=>{S.month=cm.value;render();};

  const atx=$('atx');if(atx)atx.onclick=()=>{S.edit='add-tx';render();};
  document.querySelectorAll('[data-eid]').forEach(b=>b.onclick=()=>{S.edit={type:'tx',id:+b.dataset.eid};render();});
  document.querySelectorAll('[data-chk]').forEach(c=>c.onchange=e=>{
    const t=S.data.months[S.month].transactions.find(x=>x.id===+e.target.dataset.chk);
    if(t){t.checked=e.target.checked;save();}
  });
  const fs=$('ff-save');if(fs)fs.onclick=()=>{
    const k=$('ff-ket').value.trim();if(!k){$('ff-ket').focus();return;}
    const t={tgl:+$('ff-tgl').value||1,ket:k,masuk:+$('ff-m').value||0,keluar:+$('ff-k').value||0,checked:$('ff-c').value==='1'};
    const id=fs.dataset.id?+fs.dataset.id:null,mo=S.data.months[S.month];
    if(id){const x=mo.transactions.find(y=>y.id===id);if(x)Object.assign(x,t);}
    else{mo.transactions.push({id:mkId(),...t});mo.transactions.sort((a,b)=>a.tgl-b.tgl);}
    S.edit=null;save();render();
  };
  const fd=$('ff-del');if(fd)fd.onclick=()=>{
    if(!confirm('Hapus transaksi ini?'))return;
    const id=+fd.dataset.id,mo=S.data.months[S.month];
    mo.transactions=mo.transactions.filter(t=>t.id!==id);
    S.edit=null;save();render();
  };
  const fc=$('ff-cancel');if(fc)fc.onclick=()=>{S.edit=null;render();};

  const ap=$('apel');if(ap)ap.onclick=()=>{S.edit='add-pel';render();};
  document.querySelectorAll('[data-peid]').forEach(b=>b.onclick=()=>{S.edit={type:'pel',id:+b.dataset.peid};render();});
  const ps=$('pf-save');if(ps)ps.onclick=()=>{
    const n=$('pf-n').value.trim();if(!n){$('pf-n').focus();return;}
    const p={nama:n,selesai:$('pf-s').value.trim()||'—',status:$('pf-st').value,hematBln:+$('pf-h').value||0};
    const id=ps.dataset.id?+ps.dataset.id:null;
    if(id){const x=S.data.pelunasan.find(y=>y.id===id);if(x)Object.assign(x,p);}
    else S.data.pelunasan.push({id:mkId(),...p});
    S.edit=null;save();render();
  };
  const pd=$('pf-del');if(pd)pd.onclick=()=>{
    if(!confirm('Hapus cicilan ini?'))return;
    S.data.pelunasan=S.data.pelunasan.filter(p=>p.id!==+pd.dataset.id);
    S.edit=null;save();render();
  };
  const pc=$('pf-cancel');if(pc)pc.onclick=()=>{S.edit=null;render();};

  const at=$('atab');if(at)at.onclick=()=>{S.edit='add-tab';render();};
  document.querySelectorAll('[data-tbid]').forEach(b=>b.onclick=()=>{S.edit={type:'tab',id:+b.dataset.tbid};render();});
  const ts=$('tf-save');if(ts)ts.onclick=()=>{
    const i=$('tf-i').value.trim();if(!i){$('tf-i').focus();return;}
    const t={item:i,tanggal:$('tf-t').value.trim(),nilai:+$('tf-n').value||0};
    const id=ts.dataset.id?+ts.dataset.id:null;
    if(id){const x=S.data.tabungan.find(y=>y.id===id);if(x)Object.assign(x,t);}
    else S.data.tabungan.push({id:mkId(),...t});
    S.edit=null;save();render();
  };
  const td=$('tf-del');if(td)td.onclick=()=>{
    if(!confirm('Hapus tabungan ini?'))return;
    S.data.tabungan=S.data.tabungan.filter(t=>t.id!==+td.dataset.id);
    S.edit=null;save();render();
  };
  const tc=$('tf-cancel');if(tc)tc.onclick=()=>{S.edit=null;render();};

  const ex=$('exp');if(ex)ex.onclick=()=>{
    const b=new Blob([JSON.stringify(S.data,null,2)],{type:'application/json'});
    const u=URL.createObjectURL(b),a=document.createElement('a');
    const d=new Date().toISOString().slice(0,10);
    a.href=u;a.download=`keuangan-2026-${d}.json`;a.click();URL.revokeObjectURL(u);
  };
  const im=$('imp');if(im)im.onclick=()=>$('imp-f').click();
  const imf=$('imp-f');if(imf)imf.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const p=JSON.parse(ev.target.result);
        if(!p.months||!p.pelunasan||!p.tabungan){alert('File tidak valid');return;}
        if(!confirm('Ganti data saat ini dengan data dari file?'))return;
        let mx=0;for(const m of Object.values(p.months))for(const t of m.transactions||[])if(t.id>mx)mx=t.id;
        for(const x of p.pelunasan)if(x.id>mx)mx=x.id;
        for(const x of p.tabungan)if(x.id>mx)mx=x.id;
        nid=mx+1;S.data=p;save();render();
      }catch(err){alert('Gagal baca file: '+err.message);}
    };
    r.readAsText(f);
  };
  const rs=$('rs');if(rs)rs.onclick=()=>{S.reset=true;render();};
  const rs2=$('rs2');if(rs2)rs2.onclick=()=>{nid=1;S.data=build();S.reset=false;save();render();};
  const rsc=$('rsc');if(rsc)rsc.onclick=()=>{S.reset=false;render();};
}

S.data=load();save();render();

if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});}
</script>
</body>
</html>
